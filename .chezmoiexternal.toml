# oh-my-zsh custom plugins (OMZ itself is installed via run_once_install-omz.sh and self-updates)
[".oh-my-zsh/custom/plugins/fast-syntax-highlighting"]
    type = "git-repo"
    url = "https://github.com/zdharma-continuum/fast-syntax-highlighting.git"
    refreshPeriod = "168h"
[".oh-my-zsh/custom/plugins/zsh-aliases-eza"]
    type = "git-repo"
    url = "https://github.com/DarrinTisdale/zsh-aliases-exa.git"
    refreshPeriod = "168h"
[".oh-my-zsh/custom/plugins/zsh-better-npm-completion"]
    type = "git-repo"
    url = "https://github.com/lukechilds/zsh-better-npm-completion.git"
    refreshPeriod = "168h"
[".oh-my-zsh/custom/plugins/zsh-vi-mode"]
    type = "git-repo"
    url = "https://github.com/jeffreytse/zsh-vi-mode.git"
    refreshPeriod = "168h"
[".oh-my-zsh/custom/plugins/zsh-autosuggestions"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-autosuggestions.git"
    refreshPeriod = "168h"
# Vim plug
[".vim/autoload/plug.vim"]
    type = "file"
    url = "https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim"
    refreshPeriod = "300h"
[".local/bin/cht.sh"]
    type = "file"
    url = "https://cht.sh/:cht.sh"
    refreshPeriod = "300h"
    executable = true
[".config/bat/themes/Catppuccin-latte.tmTheme"]
    type = "file"
    url = "https://raw.githubusercontent.com/catppuccin/bat/main/themes/Catppuccin%20Latte.tmTheme"
    refreshPeriod = "300h"
[".config/bat/themes/Catppuccin-frappe.tmTheme"]
    type = "file"
    url = "https://raw.githubusercontent.com/catppuccin/bat/main/themes/Catppuccin%20Frappe.tmTheme"
    refreshPeriod = "300h"
{{- if (eq .chezmoi.os "linux") }}
{{-   if (or (eq .chezmoi.osRelease.id "ubuntu") (eq .chezmoi.osRelease.id "linuxmint")) }}
# Neovim will be build from this directory
{{-      if (eq .chezmoi.arch "arm64")}}
[".neovim"]
    type = "archive"
    url = "https://github.com/neovim/neovim/releases/download/v0.11.4/nvim-linux-arm64.tar.gz"
    refreshPeriod = "1000h"
    stripComponents = 1
{{-      else if (eq .chezmoi.arch "amd64")}}
[".neovim"]
    type = "archive"
    url = "https://github.com/neovim/neovim/releases/download/v0.11.4/nvim-linux-x86_64.tar.gz"
    refreshPeriod = "1000h"
    stripComponents = 1
{{-      end}}
{{-   end }}
[".fzf"]
    type = "archive"
    url = "https://github.com/junegunn/fzf/archive/master.tar.gz"
    refreshPeriod = "48h"
    stripComponents = 1
{{- end }}
